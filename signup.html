            <h1 class="text-3xl font-bold tracking-tight text-white mt-4">Criar sua Conta</h1>
            <p class="text-slate-400 text-sm mt-2">Junte-se ao Smart Stock e otimize seu inventário</p>
        </div>

        <form id="signup-form" class="space-y-5 relative z-10">
            <!-- Nome Completo -->
            <div>
                <label for="signup-name" class="block text-sm font-medium text-slate-300 mb-2 ml-1">Nome Completo</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary transition-colors group-focus-within:text-neon-blue">person</span>
                    <input id="signup-name" 
                        class="block w-full pl-11 pr-4 py-4 bg-white/5 dark:bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-neon-blue focus:border-transparent transition-all outline-none placeholder:text-slate-500 text-white" 
                        placeholder="Ex: João Silva" 
                        type="text" required/>
                </div>
            </div>

            <!-- E-mail -->
            <div>
                <label for="signup-email" class="block text-sm font-medium text-slate-300 mb-2 ml-1">E-mail Corporativo</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary transition-colors group-focus-within:text-neon-blue">mail</span>
                    <input id="signup-email" 
                        class="block w-full pl-11 pr-4 py-4 bg-white/5 dark:bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-neon-blue focus:border-transparent transition-all outline-none placeholder:text-slate-500 text-white" 
                        placeholder="seu@empresa.com" 
                        type="email" required/>
                </div>
            </div>

            <!-- Senha -->
            <div>
                <label for="signup-password" class="block text-sm font-medium text-slate-300 mb-2 ml-1">Senha</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary transition-colors group-focus-within:text-neon-blue">lock</span>
                    <input id="signup-password" 
                        class="block w-full pl-11 pr-12 py-4 bg-white/5 dark:bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-neon-blue focus:border-transparent transition-all outline-none placeholder:text-slate-500 text-white" 
                        placeholder="Crie uma senha forte" 
                        type="password" required/>
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                        <span id="toggle-signup-password" class="material-symbols-outlined text-slate-400 cursor-pointer hover:text-white transition-colors">visibility</span>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <button id="signup-btn" class="w-full mt-6 py-4 rounded-xl font-bold text-white tracking-wider uppercase bg-gradient-to-r from-primary to-neon-blue hover:from-neon-blue hover:to-neon-green shadow-lg shadow-primary/20 hover:shadow-neon-blue/30 transition-all duration-300 transform active:scale-[0.98]" type="submit">
                Criar Conta Grátis
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center relative z-10">
            <p class="text-slate-400 text-sm">
                Já possui acesso? 
                <a class="text-neon-blue font-semibold hover:text-neon-green transition-colors underline-offset-4 hover:underline" href="login.html">
                    Faça Login
                </a>
            </p>
        </div>

        <!-- Background Decoration Elements -->
        <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-primary/20 blur-[80px] rounded-full"></div>
            <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-neon-green/20 blur-[80px] rounded-full"></div>
        </div>
    </div>

    <!-- External Decorative Lights -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-30">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-neon-green blur-[120px] rounded-full"></div>
    </div>
</body>
</html>
